const nowStr   = () => new Date().toLocaleString("zh-TW",{hour12:false});
const daysDiff = (d) => { if(!d) return null; return Math.ceil((new Date(d)-new Date(todayStr()))/86400000); };
const expColor = (d) => { const n=daysDiff(d); if(n===null) return ""; if(n<=3) return "red"; if(n<=7) return "yellow"; return ""; };
const gid = () => Math.random().toString(36).slice(2,9);

  {id:"r14",name:"林鳳營鮮奶",group:"乳製品",putDate:"2026-03-24",expDate:"2026-03-29",qty:1,section:"fridge"},
  {id:"r15",name:"優格",group:"乳製品",putDate:"2026-03-22",expDate:"2026-04-01",qty:2,section:"fridge"},

const MOCK_TRASH = [
  {id:"t1",trashId:"t1",name:"臭豆腐",group:"剩菜/熟食",section:"fridge",trashDate:"2026-03-24",trashQty:1},
  {id:"t2",trashId:"t2",name:"過期優酪乳",group:"乳製品",section:"fridge",trashDate:"2026-03-23",trashQty:1},
  {id:"t3",trashId:"t3",name:"壞掉的番茄",group:"蔬菜",section:"fridge",trashDate:"2026-03-22",trashQty:2},
];
const MOCK_LOG = [
  {id:"l1",time:"2026-03-10 09:00:00",name:"高麗菜豬肉水餃",action:"加入",qty:3,section:"freezer",group:"水餃"},
  {id:"l2",time:"2026-03-20 18:30:00",name:"去骨雞腿排",action:"加入",qty:4,section:"freezer",group:"雞肉"},
  {id:"l3",time:"2026-03-22 07:00:00",name:"臭豆腐",action:"丟掉",qty:1,section:"fridge",group:"剩菜/熟食"},
  {id:"l4",time:"2026-03-23 20:00:00",name:"過期優酪乳",action:"丟掉",qty:1,section:"fridge",group:"乳製品"},
  {id:"l5",time:"2026-03-24 12:00:00",name:"雞蛋",action:"使用",qty:2,section:"fridge",group:"蛋/豆腐"},
  {id:"l6",time:"2026-03-25 19:30:00",name:"昨晚剩下的滷肉飯",action:"加入",qty:1,section:"fridge",group:"剩菜/熟食"},
];

/* ═══════════════ GOOGLE SHEETS API ═══════════════ */
const GS_URL = "https://script.google.com/macros/s/AKfycbwP40ykjHVB_RKTG0lmFPuL-Yj2pl_I-l2Mos7WnJXPb9r2wFLih6GeL3PI6JBQxcWyKw/exec";

async function gsGet(action, sheet) {
  const url = `${GS_URL}?action=${action}${sheet ? "&sheet=" + sheet : ""}`;
  const res = await fetch(url);
  return res.json();
}

async function gsPost(body) {
  const res = await fetch(GS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return res.json();
}

function useStorage(key, seed) {
  const [val, setVal] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null) return seed;
      const p = JSON.parse(raw);
      if (Array.isArray(p) && p.length === 0) return seed;
      return p;
    } catch { return seed; }
  });
  useEffect(() => { localStorage.setItem(key, JSON.stringify(val)); }, [key, val]);
  return [val, setVal];
}

/* ═══════════════ APP ROOT ═══════════════ */
function App() {
  const [view, setView] = useState("home");
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState(""); // "", "syncing", "ok", "error"

  // Groups 仍用 localStorage（使用者個人設定）
  const [freezerGroups, setFreezerGroups] = useStorage("fg3", FREEZER_GROUPS);
  const [fridgeGroups,  setFridgeGroups]  = useStorage("rg3", FRIDGE_GROUPS);

  // 資料狀態
  const [freezerItems, setFreezerItems] = useState(MOCK_FREEZER);
  const [fridgeItems,  setFridgeItems]  = useState(MOCK_FRIDGE);
  const [trashItems,   setTrashItems]   = useState(MOCK_TRASH);
  const [logItems,     setLogItems]     = useState(MOCK_LOG);

  // 首次載入從 Google Sheets 拉資料
  useEffect(() => {
    loadAll();
  }, []);

  const loadAll = async () => {
    setLoading(true);
    try {
      const res = await gsGet("getAllSheets");
      if (res.ok) {
        if (res.data.freezer?.length) setFreezerItems(res.data.freezer.map(r => ({...r, qty: Number(r.qty)||0})));
        if (res.data.fridge?.length)  setFridgeItems(res.data.fridge.map(r  => ({...r, qty: Number(r.qty)||0})));
        if (res.data.trash?.length)   setTrashItems(res.data.trash.map(r    => ({...r, trashQty: Number(r.trashQty)||0})));
        if (res.data.log?.length)     setLogItems(res.data.log.map(r        => ({...r, qty: Number(r.qty)||0})));
      }
    } catch(e) { console.error("loadAll error", e); }
    setLoading(false);
  };

  const sync = async (fn) => {
    setSyncStatus("syncing");
    try { await fn(); setSyncStatus("ok"); }
    catch(e) { setSyncStatus("error"); console.error(e); }
    setTimeout(() => setSyncStatus(""), 2000);
  };

  const isFreeze  = view === "freezer";
  const items     = isFreeze ? freezerItems : fridgeItems;
  const setItems  = isFreeze ? setFreezerItems : setFridgeItems;
  const groups    = isFreeze ? freezerGroups : fridgeGroups;
  const setGroups = isFreeze ? setFreezerGroups : setFridgeGroups;
  const section   = isFreeze ? "freezer" : "fridge";

  const addLog = async (name, action, qty, sec, group) => {
    const entry = { id: gid(), time: nowStr(), name, action, qty, section: sec, group };
    setLogItems(p => [...p, entry]);
    await gsPost({ action: "add", sheet: "log", data: entry });
  };

  const addItem = async (item) => {
    const newItem = { ...item, id: gid() };
    setItems(p => [...p, newItem]);
    await sync(async () => {
      await gsPost({ action: "add", sheet: item.section, data: newItem });
      await addLog(item.name, "加入", item.qty, item.section, item.group);
    });
  };

  const updateItem = async (id, patch, logQty, logAction, logName, logSection, logGroup) => {
    const sec = logSection || section;
    setItems(p => p.map(i => i.id === id ? { ...i, ...patch } : i));
    await sync(async () => {
      await gsPost({ action: "update", sheet: sec, id, patch });
      if (logAction) await addLog(logName, logAction, logQty, sec, logGroup);
    });
  };

  const removeItem = async (id, sec) => {
    const s = sec || section;
    setItems(p => p.filter(i => i.id !== id));
    await sync(() => gsPost({ action: "delete", sheet: s, id }));
  };

  const moveToTrash = async (item, qty, skipLog) => {
    const entry = { ...item, trashDate: todayStr(), trashQty: qty, trashId: gid() };
    setTrashItems(p => [...p, entry]);
    await sync(async () => {
      await gsPost({ action: "add", sheet: "trash", data: entry });
      if (!skipLog) await addLog(item.name, "丟掉", qty, item.section, item.group);
    });
  };

  const handleDecrement = async (item) => {
    if (item.qty <= 1) {
      setItems(p => p.filter(i => i.id !== item.id));
      await sync(async () => {
        await gsPost({ action: "delete", sheet: item.section, id: item.id });
        await addLog(item.name, "使用", 1, item.section, item.group);
      });
    } else {
      setItems(p => p.map(i => i.id === item.id ? { ...i, qty: i.qty - 1 } : i));
      await sync(async () => {
        await gsPost({ action: "update", sheet: item.section, id: item.id, patch: { qty: item.qty - 1 } });
        await addLog(item.name, "使用", 1, item.section, item.group);
      });
    }
  };

  const handleTrashOne = async (item) => {
    await moveToTrash(item, 1);
    if (item.qty <= 1) {
      setItems(p => p.filter(i => i.id !== item.id));
      await sync(() => gsPost({ action: "delete", sheet: item.section, id: item.id }));
    } else {
      setItems(p => p.map(i => i.id === item.id ? { ...i, qty: i.qty - 1 } : i));
      await sync(() => gsPost({ action: "update", sheet: item.section, id: item.id, patch: { qty: item.qty - 1 } }));
    }
  };

  const handleTrashAll = async (item) => {
    await moveToTrash(item, item.qty);
    setItems(p => p.filter(i => i.id !== item.id));
    await sync(() => gsPost({ action: "delete", sheet: item.section, id: item.id }));
  };

  const handleUndoTrash = async (trashId) => {
    const t = trashItems.find(x => x.trashId === trashId);
    if (!t) return;
    const setI = t.section === "freezer" ? setFreezerItems : setFridgeItems;
    const allItems = t.section === "freezer" ? freezerItems : fridgeItems;
    const existing = allItems.find(i => i.name === t.name && i.group === t.group);
    if (existing) {
      setI(p => p.map(i => i.id === existing.id ? { ...i, qty: i.qty + t.trashQty } : i));
      await sync(() => gsPost({ action: "update", sheet: t.section, id: existing.id, patch: { qty: existing.qty + t.trashQty } }));
    } else {
      const restored = { id: gid(), name: t.name, group: t.group, putDate: t.putDate || todayStr(), expDate: t.expDate || "", qty: t.trashQty, section: t.section, note: t.note || "" };
      setI(p => [...p, restored]);
      await sync(() => gsPost({ action: "add", sheet: t.section, data: restored }));
    }
    setTrashItems(p => p.filter(x => x.trashId !== trashId));
    await sync(async () => {
      await gsPost({ action: "delete", sheet: "trash", id: trashId });
      await addLog(t.name, "返回冰箱", t.trashQty, t.section, t.group);
    });
  };

  const stats = (arr) => ({
    total:   arr.reduce((s, i) => s + (Number(i.qty) || 0), 0),
    urgent:  arr.filter(i => expColor(i.expDate) === "red").length,
    warning: arr.filter(i => expColor(i.expDate) === "yellow").length,
  });

  if (loading) return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#050d1a,#091428,#072020)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, fontFamily:"Nunito,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap'); @keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{ fontSize:52 }}>🦖🏔️🐻</div>
      <div style={{ width:40, height:40, border:"3px solid rgba(100,255,200,.2)", borderTop:"3px solid #4dffaa", borderRadius:"50%", animation:"spin 1s linear infinite" }}/>
      <div style={{ color:"rgba(180,230,255,.7)", fontSize:15, fontWeight:700 }}>正在從雲端載入資料...</div>
    </div>
  );

  const syncBadge = syncStatus === "syncing" ? "⏳" : syncStatus === "ok" ? "✅" : syncStatus === "error" ? "❌" : null;

  if (view === "home") return <HomeScreen onSelect={setView} trashCount={trashItems.length} freezerStats={stats(freezerItems)} fridgeStats={stats(fridgeItems)} syncBadge={syncBadge} onRefresh={loadAll}/>;
  if (view === "trash") return <TrashScreen trash={trashItems} onDelete={async id => { setTrashItems(p => p.filter(t => t.trashId !== id)); await gsPost({ action:"delete", sheet:"trash", id }); }} onUndo={handleUndoTrash} onBack={() => setView("home")}/>;
  if (view === "log") return <LogScreen log={logItems} setLog={setLogItems} onBack={() => setView("home")}/>;
  if (view === "scanner") return <ScannerScreen onAdd={newItems => { newItems.forEach(it => addItem({ ...it, group: groups[0], section })); setView(section); }} onBack={() => setView(section)} section={section} groups={groups}/>;

  return <SectionScreen section={view} items={items} groups={groups} setGroups={setGroups}
    onAdd={addItem} onUpdate={updateItem} onDecrement={handleDecrement} onTrashOne={handleTrashOne} onTrashAll={handleTrashAll}
    onBack={() => setView("home")} onTrashView={() => setView("trash")} onLogView={() => setView("log")} onScanner={() => setView("scanner")}
    trashCount={trashItems.length} syncBadge={syncBadge}/>;
}

/* ═══════════════ HOME ═══════════════ */
function HomeScreen({onSelect,trashCount,freezerStats,fridgeStats,syncBadge,onRefresh}){
  return(
    <div style={H.wrap}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        @keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:.7}100%{transform:translateY(102vh) rotate(720deg);opacity:0}}
        @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes glow{0%,100%{text-shadow:0 0 16px rgba(100,255,200,.4)}50%{text-shadow:0 0 36px rgba(80,255,180,.8),0 0 60px rgba(50,200,130,.4)}}
        @keyframes blinkRed{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0)}50%{box-shadow:0 0 12px 3px rgba(255,80,80,.6)}}
        @keyframes blinkYellow{0%,100%{box-shadow:0 0 0 0 rgba(255,200,0,0)}50%{box-shadow:0 0 12px 3px rgba(255,200,0,.5)}}
        button:active{opacity:.8;transform:scale(.96)}
      `}</style>
      {[...Array(12)].map((_,i)=>(
        <span key={i} style={{position:"absolute",top:-10,left:`${4+i*8}%`,fontSize:i%3===0?18:12,color:"rgba(180,240,255,.45)",animation:`fall ${4.5+i*.7}s linear ${i*.45}s infinite`,pointerEvents:"none",userSelect:"none"}}>
          {["❄","❅","❆"][i%3]}
        </span>
      ))}
      <div style={{textAlign:"center",zIndex:1,animation:"floatY 4s ease-in-out infinite"}}>
        <div style={{fontSize:46,marginBottom:6}}>🦖🏔️🐻</div>
        <h1 style={{fontFamily:"Nunito",fontSize:22,fontWeight:900,margin:"0 0 4px",letterSpacing:1,animation:"glow 3s ease-in-out infinite"}}>
          <span style={{color:"#4dff90"}}>豆豆龍</span><span style={{color:"rgba(200,230,255,.85)"}}>與</span><span style={{color:"#c8a87a"}}>小熊怪</span><span style={{color:"#afffff"}}>的冰山島 🏝️</span>
        </h1>
        <div style={{fontSize:12,color:"rgba(180,230,255,.6)",fontFamily:"Nunito"}}>✨ 食材管理小屋 ✨</div>
      </div>

      <div style={H.fridge}>
        <div style={H.roof}><div style={H.vent}/></div>
        <div style={H.doors}>
          <button style={H.door} onClick={()=>onSelect("freezer")}>
            <div style={H.handleL}/>
            <div style={{fontSize:26,marginBottom:4}}>❄️</div>
            <div style={{fontFamily:"Nunito",fontSize:14,fontWeight:900,color:"#1a3a5a",letterSpacing:1}}>冷凍庫</div>
            <div style={{fontFamily:"Nunito",fontSize:9,color:"#3a5a7a",marginBottom:8}}>FREEZER</div>
            <DoorBadge stats={freezerStats} color="#4dc8ff"/>
          </button>
          <div style={H.divider}/>
          <button style={H.door} onClick={()=>onSelect("fridge")}>
            <div style={H.handleR}/>
            <div style={{fontSize:26,marginBottom:4}}>🌿</div>
            <div style={{fontFamily:"Nunito",fontSize:14,fontWeight:900,color:"#1a3a5a",letterSpacing:1}}>冷藏庫</div>
            <div style={{fontFamily:"Nunito",fontSize:9,color:"#3a5a7a",marginBottom:8}}>FRIDGE</div>
            <DoorBadge stats={fridgeStats} color="#4dffaa"/>
          </button>
        </div>
        <div style={H.foot}/>
      </div>

      <div style={{display:"flex",gap:10,zIndex:1,flexWrap:"wrap",justifyContent:"center"}}>
        <button style={H.bottomBtn} onClick={()=>onSelect("trash")}>
          🗑️ 垃圾桶{trashCount>0&&<span style={{marginLeft:5,background:"rgba(255,90,90,.55)",borderRadius:10,padding:"1px 7px",fontSize:11}}>{trashCount}</span>}
        </button>
        <button style={H.bottomBtn} onClick={()=>onSelect("log")}>📋 紀錄表</button>
        <button style={H.bottomBtn} onClick={onRefresh} title="重新從雲端載入">🔄 重新整理</button>
      </div>
      {syncBadge&&<div style={{position:"fixed",top:14,right:14,fontSize:18,zIndex:99}}>{syncBadge}</div>}
    </div>
  );
}

function DoorBadge({stats,color}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:3,width:"100%",padding:"0 8px",boxSizing:"border-box"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.25)",borderRadius:8,padding:"3px 7px"}}>
        <span style={{fontSize:10,color:"#1a3a5a",fontFamily:"Nunito",fontWeight:700}}>品項</span>
        <span style={{fontSize:13,fontWeight:900,color,fontFamily:"Nunito",textShadow:`0 0 8px ${color}`}}>{stats.total}</span>
      </div>
      {stats.urgent>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,60,60,.25)",borderRadius:8,padding:"3px 7px"}}>
          <span style={{fontSize:10,color:"#ff8080",fontFamily:"Nunito",fontWeight:700}}>🔴 3天內到期</span>
          <span style={{fontSize:13,fontWeight:900,color:"#ff8080",fontFamily:"Nunito"}}>{stats.urgent}</span>
        </div>
      )}
      {stats.warning>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,200,0,.2)",borderRadius:8,padding:"3px 7px"}}>
          <span style={{fontSize:10,color:"#ffcc40",fontFamily:"Nunito",fontWeight:700}}>🟡 7天內到期</span>
          <span style={{fontSize:13,fontWeight:900,color:"#ffcc40",fontFamily:"Nunito"}}>{stats.warning}</span>
        </div>
      )}
    </div>
  );
}

const H={
  wrap:{minHeight:"100vh",background:"linear-gradient(160deg,#050d1a,#091428,#072020)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Nunito,sans-serif",position:"relative",overflow:"hidden",padding:20,gap:20},
  fridge:{background:"linear-gradient(180deg,#c0d0e0,#a8bcd0)",borderRadius:20,padding:"8px 8px 10px",boxShadow:"0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.4)",width:250,zIndex:1},
  roof:{background:"linear-gradient(180deg,#d0e0f0,#b0c8dc)",borderRadius:"12px 12px 4px 4px",height:14,marginBottom:5,display:"flex",alignItems:"center",justifyContent:"center"},
  vent:{width:50,height:4,background:"rgba(80,110,140,.4)",borderRadius:2},
  doors:{display:"flex",gap:4,height:230},
  divider:{width:5,background:"linear-gradient(180deg,#7090b0,#5070a0)",borderRadius:2,flexShrink:0},
  door:{flex:1,background:"linear-gradient(150deg,#e8f4ff,#c0d8ec)",borderRadius:8,border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",paddingTop:16,position:"relative",boxShadow:"inset 0 2px 6px rgba(255,255,255,.6),0 2px 8px rgba(0,0,0,.25)",transition:"transform .15s"},
  handleL:{position:"absolute",right:6,top:"40%",transform:"translateY(-50%)",width:4,height:30,background:"linear-gradient(180deg,#607080,#405060)",borderRadius:2,boxShadow:"0 1px 4px rgba(0,0,0,.4)"},
  handleR:{position:"absolute",left:6,top:"40%",transform:"translateY(-50%)",width:4,height:30,background:"linear-gradient(180deg,#607080,#405060)",borderRadius:2,boxShadow:"0 1px 4px rgba(0,0,0,.4)"},
  foot:{background:"linear-gradient(180deg,#a8bcd0,#8090a8)",borderRadius:"4px 4px 14px 14px",height:18,marginTop:5},
  bottomBtn:{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"rgba(200,230,255,.75)",borderRadius:22,padding:"9px 18px",cursor:"pointer",fontSize:14,fontFamily:"Nunito",zIndex:1,display:"flex",alignItems:"center"},
};

/* ═══════════════ SECTION ═══════════════ */
function SectionScreen({section,items,groups,setGroups,onAdd,onUpdate,onDecrement,onTrashOne,onTrashAll,onBack,onTrashView,onLogView,onScanner,trashCount,syncBadge}){
  const isFreeze=section==="freezer";
  const accent=isFreeze?"#4dc8ff":"#4dffaa";
  const accentBg=isFreeze?"rgba(0,150,255,.2)":"rgba(0,220,120,.2)";
  const bgGrad=isFreeze?"linear-gradient(160deg,#040e1e,#071428,#051020)":"linear-gradient(160deg,#040e0a,#071410,#051810)";
  const hdrBg=isFreeze?"rgba(0,80,160,.4)":"rgba(0,100,50,.4)";

  const [openGroups,setOpenGroups]=useState(()=>Object.fromEntries(groups.map(g=>[g,false])));
  const [editGroups,setEditGroups]=useState(false);
  const [newGroup,setNewGroup]=useState("");
  const [confirmTrash,setConfirmTrash]=useState(null);
  const [addingTo,setAddingTo]=useState(null);
  const [form,setForm]=useState({name:"",putDate:todayStr(),expDate:"",qty:1});
  const [quickAdd,setQuickAdd]=useState(false);
  const [quickForm,setQuickForm]=useState({name:"",putDate:todayStr(),expDate:"",qty:1});
  const [movingItem,setMovingItem]=useState(null);
  const longPress=useRef(null);

  useEffect(()=>{
    setOpenGroups(prev=>{
      const next={};
      groups.forEach(g=>{next[g]=prev[g]!==undefined?prev[g]:false;});
      return next;
    });
  },[groups]);

  const toggleGroup=(g)=>setOpenGroups(p=>({...p,[g]:!p[g]}));

  const handleAdd=(group)=>{
    if(!form.name.trim()) return;
    onAdd({...form,group,section});
    setForm({name:"",putDate:todayStr(),expDate:"",qty:1});
    setAddingTo(null);
  };

  const startLP=(item)=>{longPress.current=setTimeout(()=>setConfirmTrash(item),650);};
  const endLP=()=>clearTimeout(longPress.current);

  const addGroupFn=()=>{
    const g=newGroup.trim();
    if(!g||groups.includes(g)) return;
    setGroups(p=>[...p,g]);
    setNewGroup("");
  };

  return(
    <div style={{minHeight:"100vh",background:bgGrad,fontFamily:"Nunito,sans-serif",paddingBottom:80}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        input{outline:none;font-family:Nunito,sans-serif} input::placeholder{color:rgba(200,220,255,.3)}
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
        button:active{transform:scale(.95);opacity:.85}
        @keyframes blinkRed{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0),0 0 0 0 rgba(255,80,80,0)}50%{box-shadow:0 0 0 2px rgba(255,80,80,.8),0 0 14px 4px rgba(255,80,80,.4)}}
        @keyframes blinkYellow{0%,100%{box-shadow:0 0 0 0 rgba(255,200,0,0),0 0 0 0 rgba(255,200,0,0)}50%{box-shadow:0 0 0 2px rgba(255,200,0,.7),0 0 12px 3px rgba(255,200,0,.3)}}
        input[type="date"]{color-scheme:dark}
        input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.6);cursor:pointer}
      `}</style>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:hdrBg,backdropFilter:"blur(10px)"}}>
        <button style={C.backBtn} onClick={onBack}>← 返回</button>
        <div style={{fontFamily:"Nunito",fontSize:17,fontWeight:900,color:accent}}>{isFreeze?"❄️ 冷凍庫":"🌿 冷藏庫"}</div>
        <div style={{display:"flex",gap:6}}>
          <button style={{...C.iconBtn,background:accentBg}} onClick={onScanner} title="掃描清單">📷</button>
          <button style={{...C.iconBtn,background:editGroups?"rgba(255,200,0,.3)":accentBg}} onClick={()=>setEditGroups(e=>!e)}>⚙️</button>
          <button style={{...C.iconBtn,background:quickAdd?"rgba(100,255,150,.3)":accentBg,fontSize:18,fontWeight:900}} onClick={()=>setQuickAdd(q=>!q)} title="快速新增品項">＋</button>
        </div>
      </div>

      {editGroups&&(
        <div style={{background:"rgba(0,0,0,.3)",margin:"8px 14px",borderRadius:14,padding:12}}>
          <div style={{color:"rgba(200,230,255,.8)",fontSize:12,fontWeight:700,marginBottom:8}}>📁 編輯分類群組</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {groups.map(g=>(
              <div key={g} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,.08)",borderRadius:8,padding:"4px 8px"}}>
                <span style={{color:"rgba(220,240,255,.9)",fontSize:13}}>{g}</span>
                <button style={{background:"none",border:"none",color:"rgba(255,100,100,.7)",cursor:"pointer",fontSize:13,padding:"0 2px"}}
                  onClick={()=>{if(groups.length>1) setGroups(p=>p.filter(x=>x!==g));}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...C.input,flex:1,marginBottom:0,padding:"7px 10px",fontSize:13}}
              value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="新增群組名稱"
              onKeyDown={e=>e.key==="Enter"&&addGroupFn()}/>
            <button style={{background:"rgba(100,220,100,.2)",border:"1px solid rgba(100,220,100,.4)",color:"#80ff80",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13}}
              onClick={addGroupFn}>＋</button>
          </div>
        </div>
      )}

      {quickAdd&&(
        <div style={{background:"rgba(255,255,255,.06)",margin:"0 14px 8px",borderRadius:14,padding:12,border:`1px solid ${accent}44`}}>
          <div style={{color:accent,fontSize:12,fontWeight:700,marginBottom:8,fontFamily:"Nunito"}}>＋ 快速新增品項（未分類）</div>
          <input style={C.input} placeholder="✏️ 品項名稱" value={quickForm.name}
            onChange={e=>setQuickForm({...quickForm,name:e.target.value})}
            onKeyDown={e=>{ if(e.key==="Enter"&&quickForm.name.trim()){ onAdd({...quickForm,group:"未分類",section}); setQuickForm({name:"",putDate:todayStr(),expDate:"",qty:1}); setQuickAdd(false); }}}
            autoFocus/>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
            <FormFieldCard label="📅 放入日期" accent={accent}>
              <input style={C.inputFull} type="date" value={quickForm.putDate} onChange={e=>setQuickForm({...quickForm,putDate:e.target.value})}/>
            </FormFieldCard>
            <FormFieldCard label="⏰ 到期日" accent={accent}>
              <input style={C.inputFull} type="date" value={quickForm.expDate} onChange={e=>setQuickForm({...quickForm,expDate:e.target.value})}/>
            </FormFieldCard>
            <FormFieldCard label="📦 數量" accent={accent}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"4px 0"}}>
                <button style={C.qtyBtnLg} onClick={()=>setQuickForm({...quickForm,qty:Math.max(1,quickForm.qty-1)})}>−</button>
                <span style={{color:"white",fontWeight:900,fontSize:24,minWidth:36,textAlign:"center",fontFamily:"Nunito"}}>{quickForm.qty}</span>
                <button style={C.qtyBtnLg} onClick={()=>setQuickForm({...quickForm,qty:quickForm.qty+1})}>+</button>
              </div>
            </FormFieldCard>
          </div>
          <div style={{marginBottom:8}}>
            <div style={C.label}>📁 選擇群組</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {["未分類",...groups].map(g=>(
                <button key={g}
                  style={{background:quickForm.group===g||(!quickForm.group&&g==="未分類")?"rgba(100,220,150,.25)":"rgba(255,255,255,.07)",
                    border:`1px solid ${quickForm.group===g||(!quickForm.group&&g==="未分類")?"rgba(100,220,150,.5)":"rgba(255,255,255,.1)"}`,
                    color:quickForm.group===g||(!quickForm.group&&g==="未分類")?"#80ffb0":"rgba(200,220,255,.55)",
                    borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:"Nunito"}}
                  onClick={()=>setQuickForm({...quickForm,group:g})}>{g}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:7}}>
            <button style={{flex:1,background:`${accent}22`,border:`1px solid ${accent}55`,color:accent,borderRadius:10,padding:9,cursor:"pointer",fontSize:13,fontWeight:900,fontFamily:"Nunito"}}
              onClick={()=>{
                if(!quickForm.name.trim()) return;
                const targetGroup=quickForm.group||"未分類";
                if(targetGroup==="未分類"&&!groups.includes("未分類")) setGroups(p=>[...p,"未分類"]);
                onAdd({...quickForm,group:targetGroup,section});
                setQuickForm({name:"",putDate:todayStr(),expDate:"",qty:1});
                setQuickAdd(false);
              }}>✅ 新增</button>
            <button style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(200,220,255,.6)",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontSize:13,fontFamily:"Nunito"}}
              onClick={()=>setQuickAdd(false)}>取消</button>
          </div>
        </div>
      )}
      <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:8}}>
        {groups.map(g=>{
          const gItems=items.filter(i=>i.group===g);
          const isOpen=openGroups[g];
          const hasUrgent=gItems.some(i=>expColor(i.expDate)==="red");
          const hasWarn=gItems.some(i=>expColor(i.expDate)==="yellow");
          const gc=hasUrgent?"#ff7070":hasWarn?"#ffd040":accent;

          return(
            <div key={g} style={{background:"rgba(255,255,255,.05)",borderRadius:16,border:`1px solid ${isOpen?"rgba(255,255,255,.12)":"rgba(255,255,255,.06)"}`}}>
              <button style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",background:"none",border:"none",cursor:"pointer",borderRadius:16}}
                onClick={()=>toggleGroup(g)}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15,fontWeight:900,color:gc,fontFamily:"Nunito"}}>{g}</span>
                  {gItems.length>0&&<span style={{background:"rgba(255,255,255,.1)",borderRadius:10,padding:"1px 8px",fontSize:11,color:"rgba(200,220,255,.6)"}}>
                    {gItems.length}項
                  </span>}
                  {hasUrgent&&<span style={{fontSize:12}}>🔴</span>}
                  {!hasUrgent&&hasWarn&&<span style={{fontSize:12}}>🟡</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button style={{background:accentBg,border:`1px solid ${accent}44`,color:accent,borderRadius:8,padding:"3px 10px",fontSize:12,cursor:"pointer",fontFamily:"Nunito",fontWeight:700}}
                    onClick={e=>{e.stopPropagation();setAddingTo(addingTo===g?null:g);setForm({name:"",putDate:todayStr(),expDate:"",qty:1});if(!isOpen)toggleGroup(g);}}>
                    ＋ 新增
                  </button>
                  <span style={{color:"rgba(200,220,255,.5)",fontSize:14,display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)",transition:"transform .2s"}}>▶</span>
                </div>
              </button>

              {isOpen&&(
                <div style={{padding:"0 10px 10px"}}>
                  {addingTo===g&&(
                    <div style={{background:"rgba(255,255,255,.06)",borderRadius:12,padding:11,marginBottom:8,border:`1px solid ${accent}33`}}>
                      <input style={C.input} placeholder="✏️ 品項名稱" value={form.name}
                        onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&handleAdd(g)} autoFocus/>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
                        <FormFieldCard label="📅 放入日期" accent={accent}>
                          <input style={C.inputFull} type="date" value={form.putDate} onChange={e=>setForm({...form,putDate:e.target.value})}/>
                        </FormFieldCard>
                        <FormFieldCard label="⏰ 到期日" accent={accent}>
                          <input style={C.inputFull} type="date" value={form.expDate} onChange={e=>setForm({...form,expDate:e.target.value})}/>
                        </FormFieldCard>
                        <FormFieldCard label="📦 數量" accent={accent}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"4px 0"}}>
                            <button style={C.qtyBtnLg} onClick={()=>setForm({...form,qty:Math.max(1,form.qty-1)})}>−</button>
                            <span style={{color:"white",fontWeight:900,fontSize:24,minWidth:36,textAlign:"center",fontFamily:"Nunito"}}>{form.qty}</span>
                            <button style={C.qtyBtnLg} onClick={()=>setForm({...form,qty:form.qty+1})}>+</button>
                          </div>
                        </FormFieldCard>
                      </div>
                      <div style={{display:"flex",gap:7}}>
                        <button style={{flex:1,background:`${accent}22`,border:`1px solid ${accent}55`,color:accent,borderRadius:10,padding:9,cursor:"pointer",fontSize:13,fontWeight:900,fontFamily:"Nunito"}}
                          onClick={()=>handleAdd(g)}>✅ 新增</button>
                        <button style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(200,220,255,.6)",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontSize:13,fontFamily:"Nunito"}}
                          onClick={()=>setAddingTo(null)}>取消</button>
                      </div>
                    </div>
                  )}
                  {gItems.length===0&&addingTo!==g&&(
                    <div style={{textAlign:"center",color:"rgba(180,210,255,.35)",padding:"14px 0",fontSize:13}}>這個分類還沒有東西 🌱</div>
                  )}
                  {gItems.map(item=>{
                    const ec=expColor(item.expDate);
                    const d=daysDiff(item.expDate);
                    return(
                      <div key={item.id} style={{...C.card,...(ec==="red"?{...C.cardRed,animation:"blinkRed 1.5s ease-in-out infinite"}:ec==="yellow"?{...C.cardYellow,animation:"blinkYellow 2s ease-in-out infinite"}:{})}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                          <span style={{color:"white",fontWeight:800,fontSize:15}}>{item.name}</span>
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            {ec==="red"&&<span style={{fontSize:10,background:"rgba(255,50,50,.3)",color:"#ff9090",borderRadius:10,padding:"2px 7px"}}>🔴 {d}天</span>}
                            {ec==="yellow"&&<span style={{fontSize:10,background:"rgba(255,200,0,.2)",color:"#ffe070",borderRadius:10,padding:"2px 7px"}}>🟡 {d}天</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:10,fontSize:11,color:"rgba(180,210,255,.5)",marginBottom:8,flexWrap:"wrap"}}>
                          <span>📅 {item.putDate}</span>
                          {item.expDate&&<span>⏰ {item.expDate}</span>}
                        </div>
                        <NoteField item={item} onUpdate={onUpdate}/>
                        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
                          <button style={{background:"rgba(150,150,255,.12)",border:"1px solid rgba(150,150,255,.2)",color:"rgba(180,180,255,.6)",borderRadius:7,padding:"3px 9px",fontSize:10,cursor:"pointer",fontFamily:"Nunito"}}
                            onClick={()=>setMovingItem(movingItem?.id===item.id?null:item)}>
                            📁 {item.group} ▾
                          </button>
                        </div>
                        {movingItem?.id===item.id&&(
                          <div style={{marginBottom:8,background:"rgba(0,0,0,.25)",borderRadius:10,padding:8}}>
                            <div style={{color:"rgba(200,220,255,.6)",fontSize:10,fontWeight:700,marginBottom:6,fontFamily:"Nunito"}}>移動到群組：</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                              {groups.map(g=>(
                                <button key={g}
                                  style={{background:item.group===g?"rgba(100,200,255,.25)":"rgba(255,255,255,.07)",
                                    border:`1px solid ${item.group===g?"rgba(100,200,255,.5)":"rgba(255,255,255,.1)"}`,
                                    color:item.group===g?accent:"rgba(200,220,255,.55)",
                                    borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:"Nunito",fontWeight:item.group===g?700:400}}
                                  onClick={()=>{ onUpdate(item.id,{group:g}); setMovingItem(null); }}>
                                  {g}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <button style={C.qtyBtn} onClick={()=>onDecrement(item)}>−</button>
                            <span style={{color:"white",fontWeight:900,fontSize:17,minWidth:22,textAlign:"center"}}>{item.qty}</span>
                            <button style={C.qtyBtn} onClick={()=>onUpdate(item.id,{qty:item.qty+1},1,"加入",item.name,item.section,item.group)}>+</button>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontSize:10,color:"rgba(200,200,255,.35)",fontFamily:"Nunito"}}>長按全部丟</span>
                            <button style={C.trashItemBtn}
                              onClick={()=>onTrashOne(item)}
                              onTouchStart={()=>startLP(item)} onTouchEnd={endLP}
                              onMouseDown={()=>startLP(item)} onMouseUp={endLP}
                              title="點一下丟掉1個 / 長按全部丟掉"
                            >🗑️</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(12px)",padding:"10px 16px",display:"flex",justifyContent:"center",gap:10}}>
        <button style={{...C.bottomFixedBtn}} onClick={onTrashView}>
          🗑️ 垃圾桶{trashCount>0&&<span style={{marginLeft:5,background:"rgba(255,90,90,.5)",borderRadius:10,padding:"1px 7px",fontSize:11}}>{trashCount}</span>}
        </button>
        <button style={{...C.bottomFixedBtn}} onClick={onLogView}>📋 紀錄表</button>
      </div>

      {syncBadge&&<div style={{position:"fixed",top:14,right:14,fontSize:18,zIndex:99}}>{syncBadge}</div>}
      {confirmTrash&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"linear-gradient(160deg,#101c2c,#0a1420)",border:"1px solid rgba(255,255,255,.15)",borderRadius:22,padding:"28px 24px",width:290,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.6)"}}>
            <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
            <div style={{fontFamily:"Nunito",fontSize:20,fontWeight:900,color:"white",marginBottom:6}}>全部丟掉嗎？</div>
            <div style={{color:"rgba(200,220,255,.7)",fontSize:14,marginBottom:20}}>「{confirmTrash.name}」共 {confirmTrash.qty} 個</div>
            <div style={{display:"flex",gap:10}}>
              <button style={{flex:1,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"rgba(200,220,255,.8)",borderRadius:14,padding:11,cursor:"pointer",fontSize:14,fontFamily:"Nunito"}}
                onClick={()=>setConfirmTrash(null)}>取消</button>
              <button style={{flex:1,background:"rgba(255,60,60,.35)",border:"1px solid rgba(255,80,80,.5)",color:"#ffaaaa",borderRadius:14,padding:11,cursor:"pointer",fontSize:14,fontWeight:800,fontFamily:"Nunito"}}
                onClick={()=>{onTrashAll(confirmTrash);setConfirmTrash(null);}}>全部丟掉</button>
            </div>
          </div>

/* ═══════════════ LOG ═══════════════ */
const ACTION_COLOR={"加入":"#4dffaa","使用":"#4dc8ff","丟掉":"#ff8080","返回冰箱":"#ffcc40"};

function LogScreen({log,setLog,onBack}){
  const [editing,setEditing]=useState(null); // log id being edited
  const [editForm,setEditForm]=useState({});
  const [filter,setFilter]=useState("全部");
  const filters=["全部","加入","使用","丟掉","返回冰箱"];

  const filtered=filter==="全部"?log:log.filter(l=>l.action===filter);
  const sorted=[...filtered].sort((a,b)=>b.time.localeCompare(a.time));

  const startEdit=(l)=>{setEditing(l.id);setEditForm({...l});};
  const saveEdit=()=>{
    setLog(p=>p.map(l=>l.id===editing?{...editForm}:l));
    apiUpdate("log",editing,editForm);
    setEditing(null);
  };
  const deleteLog=(id)=>{setLog(p=>p.filter(l=>l.id!==id));apiDelete("log",id);};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#08101a,#0c1628,#081420)",fontFamily:"Nunito,sans-serif",paddingBottom:20}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap'); button:active{transform:scale(.95)} input{outline:none;font-family:Nunito,sans-serif}`}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"rgba(20,60,100,.4)"}}>
        <button style={C.backBtn} onClick={onBack}>← 返回</button>
        <div style={{fontSize:17,fontWeight:900,color:"#80d8ff"}}>📋 紀錄表</div>
        <div style={{width:60}}/>
      </div>

      {/* Filter tabs */}
      <div style={{display:"flex",gap:6,padding:"10px 14px",overflowX:"auto",scrollbarWidth:"none"}}>
        {filters.map(f=>(
          <button key={f}
            style={{flexShrink:0,background:filter===f?`${ACTION_COLOR[f]||"rgba(150,180,255,.3)"}33`:"rgba(255,255,255,.06)",
              border:`1px solid ${filter===f?(ACTION_COLOR[f]||"#80aaff")+"66":"rgba(255,255,255,.1)"}`,
              color:filter===f?(ACTION_COLOR[f]||"#80aaff"):"rgba(200,220,255,.5)",
              borderRadius:14,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"Nunito",fontWeight:700,whiteSpace:"nowrap"}}
            onClick={()=>setFilter(f)}>{f}
          </button>
        ))}
      </div>

      <div style={{padding:"4px 14px",display:"flex",flexDirection:"column",gap:7}}>
        {sorted.length===0&&<div style={{textAlign:"center",color:"rgba(180,210,255,.4)",padding:40,fontSize:14}}>沒有紀錄</div>}
        {sorted.map(l=>(
          <div key={l.id}>
            {editing===l.id?(
              <div style={{...C.card,border:"1px solid rgba(100,180,255,.3)"}}>
                <div style={{display:"flex",gap:7,marginBottom:7,flexWrap:"wrap"}}>
                  <div style={{flex:2,minWidth:100}}>
                    <div style={C.label}>品項名稱</div>
                    <input style={C.inputSm} value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}/>
                  </div>
                  <div style={{flex:1,minWidth:80}}>
                    <div style={C.label}>動作</div>
                    <select style={{...C.inputSm,background:"rgba(255,255,255,.08)"}}
                      value={editForm.action} onChange={e=>setEditForm({...editForm,action:e.target.value})}>
                      {["加入","使用","丟掉","返回冰箱"].map(a=><option key={a} value={a} style={{background:"#1a2a3a"}}>{a}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"flex",gap:7,marginBottom:7,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:80}}>
                    <div style={C.label}>數量</div>
                    <input style={C.inputSm} type="number" min="1" value={editForm.qty} onChange={e=>setEditForm({...editForm,qty:Number(e.target.value)})}/>
                  </div>
                  <div style={{flex:2,minWidth:120}}>
                    <div style={C.label}>時間</div>
                    <input style={C.inputSm} value={editForm.time} onChange={e=>setEditForm({...editForm,time:e.target.value})}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:7}}>
                  <button style={{flex:1,background:"rgba(80,200,120,.25)",border:"1px solid rgba(80,200,120,.4)",color:"#80ffb0",borderRadius:9,padding:"8px",cursor:"pointer",fontSize:13,fontWeight:900,fontFamily:"Nunito"}}
                    onClick={saveEdit}>✅ 儲存</button>
                  <button style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(200,220,255,.6)",borderRadius:9,padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"Nunito"}}
                    onClick={()=>setEditing(null)}>取消</button>
                </div>
              </div>
            ):(
              <div style={{...C.card,borderLeft:`3px solid ${ACTION_COLOR[l.action]||"rgba(150,180,255,.4)"}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:11,fontWeight:700,color:ACTION_COLOR[l.action]||"#80aaff",background:`${ACTION_COLOR[l.action]||"rgba(150,180,255,.3)"}22`,borderRadius:8,padding:"2px 8px",fontFamily:"Nunito"}}>{l.action}</span>
                    <span style={{color:"white",fontWeight:700,fontSize:14}}>{l.name}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:800,color:"rgba(200,220,255,.7)"}}>×{l.qty}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:11,color:"rgba(160,190,220,.5)",display:"flex",gap:8}}>
                    <span>🕐 {l.time}</span>
                    {l.section&&<span>{l.section==="freezer"?"❄️":"🌿"} {l.group}</span>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={{background:"rgba(100,160,255,.12)",border:"1px solid rgba(100,160,255,.2)",color:"rgba(140,190,255,.7)",borderRadius:7,padding:"3px 9px",cursor:"pointer",fontSize:11,fontFamily:"Nunito"}}
                      onClick={()=>startEdit(l)}>✏️ 編輯</button>
                    <button style={{background:"rgba(255,80,80,.1)",border:"1px solid rgba(255,80,80,.2)",color:"rgba(255,140,140,.6)",borderRadius:7,padding:"3px 9px",cursor:"pointer",fontSize:11,fontFamily:"Nunito"}}
                      onClick={()=>deleteLog(l.id)}>刪除</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════ SCANNER ═══════════════ */
function ScannerScreen({onAdd,onBack,section,groups}){
  const [imgData,setImgData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [error,setError]=useState("");
  const [assignGroup,setAssignGroup]=useState(groups[0]);
  const fileRef=useRef();

  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setImgData(ev.target.result.split(",")[1]);
    r.readAsDataURL(file);
  };

  const analyze=async()=>{
    setLoading(true);setError("");setParsed(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgData}},
            {type:"text",text:`分析這張購買清單，列出所有品項，回傳純JSON陣列，每項：name(繁體中文),qty(整數,預設1),expDate(YYYY-MM-DD或空字串),putDate("${todayStr()}")。不要任何說明文字。`}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
      setParsed(JSON.parse(text));
    }catch{setError("解析失敗，請重試或確認圖片清晰度");}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#040810,#080e18,#060c18)",fontFamily:"Nunito,sans-serif"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap'); button:active{transform:scale(.95)}`}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"rgba(20,60,120,.4)"}}>
        <button style={C.backBtn} onClick={onBack}>← 返回</button>
        <div style={{fontSize:17,fontWeight:900,color:"#80c8ff"}}>📷 掃描購買清單</div>
        <div style={{width:60}}/>
      </div>
      <div style={{padding:"24px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
        <div style={{color:"rgba(180,210,255,.7)",fontSize:14,textAlign:"center",lineHeight:1.7}}>拍下或上傳購買清單照片<br/>AI 會自動辨識並整理品項 🤖</div>
        <button style={{background:"rgba(80,130,255,.12)",border:"2px dashed rgba(80,130,255,.4)",color:"rgba(140,180,255,.9)",borderRadius:16,padding:"20px 40px",cursor:"pointer",fontSize:16,width:"100%",maxWidth:320}}
          onClick={()=>fileRef.current.click()}>{imgData?"✅ 已選擇圖片":"📂 選擇圖片"}</button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
        {imgData&&!parsed&&(
          <button style={{background:"linear-gradient(135deg,rgba(80,140,255,.35),rgba(40,80,200,.35))",border:"1px solid rgba(100,160,255,.5)",color:"white",borderRadius:14,padding:"14px 36px",cursor:"pointer",fontSize:16,fontWeight:900,width:"100%",maxWidth:320,fontFamily:"Nunito"}}
            onClick={analyze} disabled={loading}>{loading?"🔍 解析中...":"🔍 開始解析"}</button>
        )}
        {error&&<div style={{color:"rgba(255,150,150,.9)",fontSize:14,textAlign:"center"}}>{error}</div>}
        {parsed&&(
          <div style={{width:"100%",maxWidth:400}}>
            <div style={{marginBottom:10}}>
              <div style={{color:"rgba(180,210,255,.7)",fontSize:12,marginBottom:4}}>加入到分類：</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {groups.map(g=>(
                  <button key={g}
                    style={{background:assignGroup===g?"rgba(80,200,120,.3)":"rgba(255,255,255,.06)",border:`1px solid ${assignGroup===g?"rgba(80,200,120,.6)":"rgba(255,255,255,.12)"}`,color:assignGroup===g?"#80ff90":"rgba(200,220,255,.6)",borderRadius:10,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"Nunito"}}
                    onClick={()=>setAssignGroup(g)}>{g}</button>
                ))}
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,.05)",borderRadius:16,padding:14,marginBottom:12}}>
              <div style={{color:"rgba(200,230,255,.8)",fontSize:13,fontWeight:800,marginBottom:10}}>📋 解析結果（{parsed.length}項）</div>
              {parsed.map((it,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.05)",color:"white",fontSize:14}}>
                  <span style={{flex:1}}>{it.name}</span>
                  <span style={{color:"rgba(150,200,255,.7)",fontSize:12}}>×{it.qty}</span>
                  {it.expDate&&<span style={{color:"rgba(255,200,100,.7)",fontSize:11}}>{it.expDate}</span>}
                </div>
              ))}
            </div>
            <button style={{width:"100%",background:"linear-gradient(135deg,rgba(0,200,100,.35),rgba(0,150,70,.35))",border:"1px solid rgba(0,220,120,.5)",color:"#80ffb0",borderRadius:14,padding:13,cursor:"pointer",fontSize:15,fontWeight:900,fontFamily:"Nunito"}}
              onClick={()=>onAdd(parsed.map(it=>({...it,group:assignGroup})))}>
              ✅ 全部加入「{assignGroup}」
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ NOTE FIELD ═══════════════ */
function NoteField({item,onUpdate}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(item.note||"");
  const ref=useRef();

  const save=()=>{
    onUpdate(item.id,{note:draft});
    setEditing(false);
  };

  if(!editing) return(
    <div
      onClick={()=>{setDraft(item.note||"");setEditing(true);}}
      style={{marginTop:6,background:"rgba(255,230,80,.07)",border:"1px dashed rgba(255,220,60,.25)",borderRadius:8,padding:"5px 9px",cursor:"pointer",minHeight:24,display:"flex",alignItems:"center",gap:6}}
    >
      <span style={{fontSize:12}}>📝</span>
      <span style={{fontSize:12,color:item.note?"rgba(255,230,120,.8)":"rgba(200,210,255,.3)",fontFamily:"Nunito",fontStyle:item.note?"normal":"italic",flex:1}}>
        {item.note||"點擊新增便利貼..."}
      </span>
    </div>
  );

  return(
    <div style={{marginTop:6,background:"rgba(255,230,80,.1)",border:"1px solid rgba(255,220,60,.4)",borderRadius:8,padding:6}}>
      <textarea
        ref={ref}
        autoFocus
        value={draft}
        onChange={e=>setDraft(e.target.value)}
        placeholder="在這裡記錄備註..."
        style={{width:"100%",background:"transparent",border:"none",color:"rgba(255,240,160,.9)",fontSize:12,fontFamily:"Nunito",resize:"none",outline:"none",minHeight:56,boxSizing:"border-box",lineHeight:1.5}}
      />
      <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:4}}>
        <button style={{background:"rgba(255,220,60,.2)",border:"1px solid rgba(255,220,60,.4)",color:"rgba(255,240,120,.9)",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontSize:12,fontFamily:"Nunito",fontWeight:700}}
          onClick={save}>✅ 儲存</button>
        <button style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(200,220,255,.5)",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontSize:12,fontFamily:"Nunito"}}
          onClick={()=>setEditing(false)}>取消</button>
      </div>
    </div>
  );
}
